; shorebridge configuration
; Copy to /etc/shorebridge/config.ini and fill in your PBX details.

[bridge]
; IP the phones and PBX reach this bridge on. "auto" = detect the LAN IP used
; to reach the PBX. Set explicitly if the host is multi-homed.
bind_ip = auto
data_dir = /opt/shorebridge
debug = false

[pbx]
; Your SIP PBX / SBC. For 3CX use the SBC address; for FreePBX/Asterisk use the
; PBX address. The bridge REGISTERs here as a normal SIP extension.
sbc_ip   = 10.0.0.10
sbc_port = 5060
; Registrar domain/realm. For 3CX cloud this is e.g. 1001.3cx.cloud.
; For FreePBX/Asterisk this is usually the PBX IP.
domain   = pbx.example.com
extension = 100
auth_id   = 100
password  = changeme

[phone]
; Timezone string sent to the phones (ShoreTel format).
timezone = Eastern Standard Time
